<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo-Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/app.js" defer></script>
</head>
<body>
  <div class="dashboard-grid">

    <!-- Greeting Widget -->
    <section id="greeting-widget" class="widget" aria-label="Greeting">
      <div class="greeting-content">
        <p id="greeting-text" class="greeting-text">Good Morning</p>
        <p id="current-time" class="current-time">00:00</p>
        <p id="current-date" class="current-date">Monday, 1 January 2000</p>
      </div>
    </section>

    <!-- Focus Timer Widget -->
    <section id="focus-timer" class="widget" aria-label="Focus Timer">
      <h2 class="widget-title">Focus Timer</h2>
      <div id="timer-display" class="timer-display" aria-live="polite">25:00</div>
      <p id="timer-complete-msg" class="timer-complete-msg" aria-live="assertive">
        🎉 Session complete! Take a break.
      </p>
      <div class="timer-controls">
        <button id="timer-start" class="btn btn-start" aria-label="Start timer">Start</button>
        <button id="timer-stop" class="btn btn-stop" aria-label="Stop timer">Stop</button>
        <button id="timer-reset" class="btn btn-reset" aria-label="Reset timer">Reset</button>
      </div>
    </section>

    <!-- Todo List Widget -->
    <section id="todo-list-widget" class="widget" aria-label="Todo List">
      <h2 class="widget-title">Tasks</h2>
      <div class="input-row">
        <input
          type="text"
          id="todo-input"
          class="text-input"
          placeholder="Add a new task…"
          aria-label="New task text"
          autocomplete="off"
        />
        <button id="todo-add-btn" class="btn btn-add" aria-label="Add task">Add</button>
      </div>
      <ul id="todo-list" class="todo-list" aria-label="Task list"></ul>
    </section>

    <!-- Quick Links Widget -->
    <section id="quick-links-widget" class="widget" aria-label="Quick Links">
      <h2 class="widget-title">Quick Links</h2>
      <div class="input-row">
        <input
          type="text"
          id="link-label-input"
          class="text-input"
          placeholder="Label"
          aria-label="Link label"
          autocomplete="off"
        />
        <input
          type="url"
          id="link-url-input"
          class="text-input"
          placeholder="https://…"
          aria-label="Link URL"
          autocomplete="off"
        />
        <button id="link-add-btn" class="btn btn-add" aria-label="Add link">Add</button>
      </div>
      <div id="links-container" class="links-container" aria-label="Saved links"></div>
    </section>

  </div>
</body>
</html>
